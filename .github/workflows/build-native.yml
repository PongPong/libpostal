name: Build Native Libraries

on:
  push:
    branches: [master, main]
    tags:
      - 'v*'
  pull_request:
    branches: [master, main]
  workflow_dispatch:

jobs:
  build-linux-x86_64:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Install Dependencies
        run: |
          sudo apt-get update -y
          sudo apt-get install -y \
            autoconf automake libtool pkg-config \
            curl build-essential openjdk-11-jdk
      
      - name: Set JAVA_HOME
        run: echo "JAVA_HOME=/usr/lib/jvm/java-11-openjdk-amd64" >> $GITHUB_ENV
      
      - name: Build Optimized
        run: |
          chmod +x scripts/build/build_jni_optimized.sh
          ./scripts/build/build_jni_optimized.sh <<< ""
      
      - name: Organize Libraries
        run: |
          mkdir -p artifacts/linux-x86_64
          cp lib/libpostal.so* artifacts/linux-x86_64/ 2>/dev/null || true
          cp lib/libpostal_jni.so artifacts/linux-x86_64/
          ls -lh artifacts/linux-x86_64/
      
      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: native-linux-x86_64
          path: artifacts/linux-x86_64/
          retention-days: 7

  build-linux-aarch64:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3
      
      - name: Build in ARM64 Container
        run: |
          docker run --rm --platform linux/arm64 \
            -v ${{ github.workspace }}:/workspace \
            -w /workspace \
            arm64v8/ubuntu:22.04 \
            bash -c "
              apt-get update && \
              apt-get install -y autoconf automake libtool pkg-config \
                curl build-essential openjdk-11-jdk && \
              export JAVA_HOME=/usr/lib/jvm/java-11-openjdk-arm64 && \
              chmod +x scripts/build/build_jni_optimized.sh && \
              ./scripts/build/build_jni_optimized.sh <<< '' && \
              mkdir -p artifacts/linux-aarch64 && \
              cp lib/libpostal.so* artifacts/linux-aarch64/ 2>/dev/null || true && \
              cp lib/libpostal_jni.so artifacts/linux-aarch64/
            "
      
      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: native-linux-aarch64
          path: artifacts/linux-aarch64/
          retention-days: 7

  build-macos-x86_64:
    runs-on: macos-13  # Intel Mac
    steps:
      - uses: actions/checkout@v4
      
      - name: Install Dependencies
        run: |
          brew install autoconf automake libtool pkg-config
      
      - name: Set JAVA_HOME
        run: echo "JAVA_HOME=$(/usr/libexec/java_home)" >> $GITHUB_ENV
      
      - name: Build Optimized
        run: |
          chmod +x scripts/build/build_jni_optimized.sh
          ./scripts/build/build_jni_optimized.sh <<< ""
      
      - name: Organize Libraries
        run: |
          mkdir -p artifacts/macos-x86_64
          cp lib/libpostal*.dylib artifacts/macos-x86_64/
          ls -lh artifacts/macos-x86_64/
      
      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: native-macos-x86_64
          path: artifacts/macos-x86_64/
          retention-days: 7

  build-macos-aarch64:
    runs-on: macos-14  # Apple Silicon Mac
    steps:
      - uses: actions/checkout@v4
      
      - name: Install Dependencies
        run: |
          brew install autoconf automake libtool pkg-config
      
      - name: Set JAVA_HOME
        run: echo "JAVA_HOME=$(/usr/libexec/java_home)" >> $GITHUB_ENV
      
      - name: Build Optimized
        run: |
          chmod +x scripts/build/build_jni_optimized.sh
          ./scripts/build/build_jni_optimized.sh <<< ""
      
      - name: Organize Libraries
        run: |
          mkdir -p artifacts/macos-aarch64
          cp lib/libpostal*.dylib artifacts/macos-aarch64/
          ls -lh artifacts/macos-aarch64/
      
      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: native-macos-aarch64
          path: artifacts/macos-aarch64/
          retention-days: 7

  build-windows-x86_64:
    runs-on: windows-latest
    defaults:
      run:
        shell: bash
    steps:
      - uses: actions/checkout@v4
      
      - name: Set up MSYS2
        uses: msys2/setup-msys2@v2
        with:
          msystem: MINGW64
          update: true
          install: >-
            base-devel
            mingw-w64-x86_64-toolchain
            mingw-w64-x86_64-autotools
            mingw-w64-x86_64-curl
      
      - name: Build in MSYS2
        shell: msys2 {0}
        run: |
          export JAVA_HOME="/c/hostedtoolcache/windows/Java_Temurin-Hotspot_jdk/11.0.21-9/x64"
          export PATH="$JAVA_HOME/bin:$PATH"
          chmod +x scripts/build/build_jni_optimized.sh
          ./scripts/build/build_jni_optimized.sh <<< ""
      
      - name: Organize Libraries
        run: |
          mkdir -p artifacts/windows-x86_64
          cp lib/*.dll artifacts/windows-x86_64/ || true
          ls -lh artifacts/windows-x86_64/
      
      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: native-windows-x86_64
          path: artifacts/windows-x86_64/
          retention-days: 7

  # Summary job to show all artifacts
  build-summary:
    needs:
      - build-linux-x86_64
      - build-linux-aarch64
      - build-macos-x86_64
      - build-macos-aarch64
      - build-windows-x86_64
    runs-on: ubuntu-latest
    steps:
      - name: Download All Artifacts
        uses: actions/download-artifact@v4
        with:
          path: all-artifacts
      
      - name: Display Summary
        run: |
          echo "## Native Libraries Build Summary" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Platform | Files | Size |" >> $GITHUB_STEP_SUMMARY
          echo "|----------|-------|------|" >> $GITHUB_STEP_SUMMARY
          
          for platform in all-artifacts/native-*; do
            platform_name=$(basename $platform | sed 's/native-//')
            file_count=$(find $platform -type f | wc -l)
            total_size=$(du -sh $platform | cut -f1)
            echo "| $platform_name | $file_count | $total_size |" >> $GITHUB_STEP_SUMMARY
          done
          
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "All native libraries built successfully! ✅" >> $GITHUB_STEP_SUMMARY
